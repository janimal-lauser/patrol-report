services:
  postgres:
    image: postgres:16-alpine
    container_name: patrol-report-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: patrol
      POSTGRES_PASSWORD: patrol_dev
      POSTGRES_DB: patrol_report
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
